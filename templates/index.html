<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Air Quality Prediction</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#43cea2,#185a9d);
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:500px;
            background:#fff;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 5px 20px rgba(0,0,0,0.3);
        }

        h1{
            text-align:center;
            color:#00695c;
            margin-bottom:20px;
        }

        p{
            text-align:center;
            color:gray;
            margin-bottom:20px;
        }

        label{
            font-weight:bold;
            display:block;
            margin-top:12px;
        }

        input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:8px;
            margin-top:5px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            border:none;
            border-radius:8px;
            background:#00796b;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#004d40;
        }

        .result{
            margin-top:20px;
            padding:15px;
            border-radius:8px;
            background:#e8f5e9;
            text-align:center;
        }

        .result h2{
            color:#1b5e20;
        }

        .footer{
            margin-top:20px;
            text-align:center;
            color:gray;
            font-size:14px;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>🌍 Air Quality Prediction</h1>

    <p>Enter the pollutant values below.</p>

    <form action="/predict" method="POST">

        <label>PM2.5</label>
        <input type="number" step="any" name="pm25" required>

        <label>PM10</label>
        <input type="number" step="any" name="pm10" required>

        <label>NO</label>
        <input type="number" step="any" name="no" required>

        <label>NO₂</label>
        <input type="number" step="any" name="no2" required>

        <label>NOx</label>
        <input type="number" step="any" name="nox" required>

        <label>NH₃</label>
        <input type="number" step="any" name="nh3" required>

        <label>CO</label>
        <input type="number" step="any" name="co" required>

        <label>SO₂</label>
        <input type="number" step="any" name="so2" required>

        <label>O₃</label>
        <input type="number" step="any" name="o3" required>

        <button type="submit">Predict AQI</button>

    </form>

    {% if prediction_text %}
    <div class="result">
        <h2>{{ prediction_text }}</h2>
        <h3>{{ category }}</h3>
    </div>
    {% endif %}

    <div class="footer">
        Air Quality Prediction using Machine Learning (Flask)
    </div>

</div>

</body>
</html>
